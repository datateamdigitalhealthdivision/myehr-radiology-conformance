name: Lint Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint markdown
        shell: bash
        run: |
          markdownlint \
            README.md \
            AGENTS.md \
            docs/**/*.md \
            annexes/**/*.md \
            ig/README.md \
            ig/input/pagecontent/*.md \
            tests/**/*.md \
            mappings/*.md \
            --disable MD013
