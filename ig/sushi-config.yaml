groups:
  profiles:
    name: FHIR Profiles
    description: Core Malaysian radiology profiles that define the computable exchange layer for order, workflow, scheduling, procedure, study, report, document sharing, provenance, and audit.
  capability-statements:
    name: Capability Statements
    description: Actor-specific conformance expectations for order placers, workflow managers, archives, viewers, document-sharing actors, and validation participants.
  terminology:
    name: Terminology Artefacts
    description: Value sets and code systems that support workflow states, accession policy options, modality coding, procedure coding, report coding, structured findings, and document-sharing metadata.
  identifiers:
    name: Naming Systems
    description: PROVISIONAL naming system resources that distinguish placeholder identifier URIs from value format, issuing authority, and future governance decisions.
  concept-maps:
    name: Concept Maps
    description: Starter mapping artefacts that explain how the provisional procedure catalogue aligns to external coding systems used by implementation partners.
  operations:
    name: Operations
    description: Optional operations retained for explicit partner patterns where standard search and read remains the national baseline.
  examples:
    name: Examples
    description: Worked examples that illustrate the expected JSON and XML payload shape for profiles, transaction patterns, errors, document submission, and direct retrieval workflows.
resources:
  StructureDefinition/my-radiology-service-request:
    name: MY Radiology ServiceRequest
    description: Radiology imaging order profile for Malaysian deployments.
    groupingId: profiles
  StructureDefinition/my-radiology-task:
    name: MY Radiology Task
    description: Workflow tracking profile for order receipt, acceptance, scheduling, progress, completion, rejection, cancellation, amendment, and report publication visibility.
    groupingId: profiles
  StructureDefinition/my-radiology-appointment:
    name: MY Radiology Appointment
    description: Optional booking and scheduling profile where Appointment is exposed through FHIR.
    groupingId: profiles
  StructureDefinition/my-radiology-procedure:
    name: MY Radiology Procedure
    description: Performed imaging procedure profile linking the originating order to the completed act.
    groupingId: profiles
  StructureDefinition/my-radiology-imaging-study:
    name: MY Radiology ImagingStudy
    description: FHIR-facing imaging study metadata aligned to the underlying DICOM study.
    groupingId: profiles
  StructureDefinition/my-radiology-dicomweb-endpoint:
    name: MY Radiology DICOMweb Endpoint
    description: DICOM WADO-RS endpoint profile used by imaging study metadata publishers and retrieval consumers.
    groupingId: profiles
  StructureDefinition/my-radiology-diagnostic-report:
    name: MY Radiology DiagnosticReport
    description: Radiology report profile for preliminary, final, amended, and addendum reporting scenarios.
    groupingId: profiles
  StructureDefinition/my-radiology-observation:
    name: MY Radiology Observation
    description: Structured radiology finding or measurement profile used when narrative reporting alone is insufficient.
    groupingId: profiles
  StructureDefinition/my-radiology-document-reference:
    name: MY Radiology DocumentReference
    description: Document-sharing profile for packaged report exchange and IHE MHD or XDS-aligned scenarios.
    groupingId: profiles
  StructureDefinition/my-radiology-mhd-submission-set:
    name: MY Radiology MHD Submission Set
    description: SubmissionSet profile used when radiology documents are submitted through IHE MHD.
    groupingId: profiles
  StructureDefinition/my-radiology-mhd-audit-event:
    name: MY Radiology MHD AuditEvent
    description: AuditEvent profile for MHD submission, query, and retrieval events.
    groupingId: profiles
  StructureDefinition/my-radiology-provenance:
    name: MY Radiology Provenance
    description: Provenance profile for authorship, amendment, and publication traceability across radiology resources.
    groupingId: profiles
  CapabilityStatement/my-radiology-his-order-placer:
    name: HIS Order Placer Capability Statement
    description: Client capability expectations for a HIS or CPOE partner placing radiology orders and reading downstream workflow and shared-document information.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-ris-workflow-manager:
    name: RIS Workflow Manager Capability Statement
    description: Server capability expectations for a RIS partner acting as the operational order filler, reporting authority, and optional direct retrieval endpoint.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-pacs-metadata-publisher:
    name: PACS Metadata Publisher Capability Statement
    description: Server capability expectations for a PACS or VNA partner exposing imaging metadata to FHIR consumers.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-viewer-consumer:
    name: Viewer Consumer Capability Statement
    description: Client capability expectations for an EHR, viewer, or direct retrieval partner consuming study metadata and report content.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-validation-consumer:
    name: Validation Consumer Capability Statement
    description: Client capability expectations for national validation and conformance testing participants.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-mhd-document-source:
    name: MHD Document Source Capability Statement
    description: Client capability expectations for systems that submit radiology documents through IHE MHD.
    groupingId: capability-statements
  CapabilityStatement/my-radiology-mhd-document-recipient:
    name: MHD Document Recipient Capability Statement
    description: Server capability expectations for the FHIR document gateway or registry that receives and serves MHD content.
    groupingId: capability-statements
  ValueSet/my-radiology-workflow-state-vs:
    name: MY Radiology Workflow State ValueSet
    description: Required business status codes for radiology Task synchronisation.
    groupingId: terminology
  ValueSet/my-radiology-accession-pattern-vs:
    name: MY Radiology Accession Pattern ValueSet
    description: Candidate accession identifier patterns carried for governance and sandbox design.
    groupingId: terminology
  ValueSet/my-radiology-clinical-indication-vs:
    name: MY Radiology Clinical Indication ValueSet
    description: Preferred SNOMED CT and ICD-10 coding envelope for clinical indication on radiology orders.
    groupingId: terminology
  ValueSet/my-radiology-procedure-code-vs:
    name: MY Radiology Procedure Code ValueSet
    description: Extensible imaging procedure catalogue binding using a PROVISIONAL RadLex mirror strategy with starter LOINC support for direct retrieval patterns.
    groupingId: terminology
  ValueSet/my-radiology-modality-vs:
    name: MY Radiology Modality ValueSet
    description: Required DICOM-aligned modality codes for imaging study publication.
    groupingId: terminology
  ValueSet/my-radiology-report-code-vs:
    name: MY Radiology Report Code ValueSet
    description: Starter LOINC radiology report codes for extensible diagnostic report exchange.
    groupingId: terminology
  ValueSet/my-radiology-finding-code-vs:
    name: MY Radiology Finding Code ValueSet
